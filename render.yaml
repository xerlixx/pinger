services:
  - type: web
    name: parking-intelligence-pinger
    runtime: python
    region: singapore        # same region as main backend for lowest latency
    plan: free
    rootDir: .               # repo root IS the pinger folder
    healthCheckPath: /health
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: MAIN_BACKEND_URL
        # Set this to your actual main backend URL after it is deployed
        value: "https://parking-intelligence-backend.onrender.com"
      - key: PING_INTERVAL
        value: "30"
      - key: PYTHONUNBUFFERED
        value: "1"
